<!DOCTYPE html>
<html lang="es" xmlns:mso="urn:schemas-microsoft-com:office:office" xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoInventario - Gestión de Fleet Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <main class="container py-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h1 class="h4 mb-0">Inventario de EcoInventario</h1>
            </div>

            <div class="card-body">

                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Departamento</th>
                                <th>Stock</th>
                            </tr>
                        </thead>

                        <tbody id="tablaInventario">
                          
                        </tbody>
                    </table>
                    <h2 class="fs-3 text-center">
                        Agregar nuevo ítem al inventario
                    </h2>
                    <div class="form-group my-4">
                       <label for="txtNombre" class="form-label">Nombre del ítem</label>
                       <input type="text" class="form-control" id="txtNombre" placeholder="Ingrese el nombre del ítem">
                    </div>

                     <div class="form-group my-4">
                       <label for="txtCategoria" class="form-label">Categoría</label>
                       <input type="text" class="form-control" id="txtCategoria" placeholder="Ingrese la categoría">
                    </div>

                     <div class="form-group my-4">
                       <label for="txtDepartamento" class="form-label">Departamento</label>
                       <input type="text" class="form-control" id="txtDepartamento" placeholder="Ingrese el departamento">
                    </div>

                     <div class="form-group my-4">
                       <label for="txtStock" class="form-label">Stock</label>
                       <input type="number" class="form-control" id="txtStock" placeholder="Ingrese el stock disponible" min="0">
                    </div>

                    <button class="btn btn-primary" id="btnAgregar">Agregar Ítem</button>

                </div>
            </div>
        </div>
    </main>

    <script src="./js/script.js"></script>
</body>

</html>
